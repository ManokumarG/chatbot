<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatBot</title>
    <style>
      :root {
        --bg-sidebar: #000000;
        --bg-main: #212121;
        --bg-input: #2f2f2f;
        --text-main: #ececec;
        --text-sidebar: #c5c5c5;
        --border-color: #424242;
        --hover-color: #2a2a2a;
        --user-msg-bg: #2f2f2f;
        --font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: var(--font-family);
        display: flex;
        height: 100vh;
        overflow: hidden;
        font-size: 14px;
      }

      /* --- Sidebar Section --- */
      #sidebar {
        width: 260px;
        background-color: var(--bg-sidebar);
        display: flex;
        flex-direction: column;
        padding: 10px;
        border-right: 1px solid var(--border-color);
      }

      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        margin-bottom: 20px;
      }

      .sidebar-logo {
        font-weight: 600;
        font-size: 16px;
      }

      .icon-btn {
        background: none;
        border: none;
        color: var(--text-sidebar);
        cursor: pointer;
        font-size: 16px;
        padding: 5px;
        border-radius: 5px;
      }

      .icon-btn:hover {
        background-color: var(--hover-color);
      }

      #new-chat-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 8px;
        color: var(--text-main);
        cursor: pointer;
        text-align: left;
        margin-bottom: 20px;
      }

      #new-chat-btn:hover {
        background-color: var(--hover-color);
      }

      .sidebar-menu-item {
        color: var(--text-sidebar);
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 5px;
      }

      .sidebar-menu-item:hover {
        background-color: var(--hover-color);
      }

      #recent-chats {
        margin-top: 20px;
        overflow-y: auto;
        flex-grow: 1;
        font-size: 13px;
      }

      .recent-chat-title {
        color: var(--text-sidebar);
        padding: 5px 10px;
        margin-top: 15px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .recent-chat-item {
        color: var(--text-sidebar);
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .recent-chat-item:hover {
        background-color: var(--hover-color);
      }

      .sidebar-footer {
        border-top: 1px solid var(--border-color);
        padding-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-sidebar);
      }

      .user-avatar {
        width: 32px;
        height: 32px;
        background-color: #d1d5db;
        color: #000;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 12px;
      }

      .upgrade-btn {
        background-color: #ffd700;
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 6px 14px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
      }

      /* --- Main Chat Section --- */
      #main-chat {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      #chat-header {
        padding: 15px 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
      }

      .plus-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background-color: #3e2f5b;
        color: #bfa1e6;
        border: 1px solid #7d5bb6;
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 13px;
        cursor: pointer;
      }

      /* Message Display Area */
      #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 30px 20%; /* Centers the text like ChatGPT */
        display: flex;
        flex-direction: column;
        scroll-behavior: smooth;
      }

      .message {
        margin-bottom: 25px;
        max-width: 80%;
        line-height: 1.6;
      }

      .message.user {
        align-self: flex-end;
        background-color: var(--user-msg-bg);
        padding: 12px 20px;
        border-radius: 20px;
        border-bottom-right-radius: 5px;
      }

      .message.bot {
        align-self: flex-start;
        padding-left: 0;
        font-size: 15px;
      }
      #main-chat {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        height: 100vh; /* Ensure it takes full height */
        position: relative;
      }

      /* Message Display Area */
      #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 30px 20% 150px 20%; /* Added 150px bottom padding to clear the input */
        display: flex;
        flex-direction: column;
        scroll-behavior: smooth;
      }

      /* Input Bar at Bottom */
      #input-container {
        position: absolute;
        bottom: 20px;
        left: 20%;
        right: 20%;
        display: flex;
        align-items: center;
        background-color: var(--bg-input);
        border-radius: 25px;
        border: 1px solid var(--border-color);
        padding: 5px 15px;
        z-index: 10; /* Ensures input stays on top of any background stray text */
      }
      /* Input Bar at Bottom */
      #input-container {
        position: absolute;
        bottom: 30px;
        left: 20%;
        right: 20%;
        display: flex;
        align-items: center;
        background-color: var(--bg-input);
        border-radius: 25px;
        border: 1px solid var(--border-color);
        padding: 5px 15px;
      }

      #user-input {
        flex-grow: 1;
        background: none;
        border: none;
        color: var(--text-main);
        font-family: var(--font-family);
        padding: 10px;
        font-size: 15px;
      }

      #user-input:focus {
        outline: none;
      }

      .input-icon-btn {
        background: none;
        border: none;
        color: var(--text-sidebar);
        font-size: 18px;
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
      }

      .input-icon-btn:hover {
        background-color: #3e3e3e;
      }

      /* Typing indicator styling */
      #typing-message {
        color: var(--text-sidebar);
        font-style: italic;
      }

      /* Responsive design for smaller screens */
      @media (max-width: 1024px) {
        #chat-box,
        #input-container {
          left: 10%;
          right: 10%;
        }
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">TechLeaf</span>
        <div>
          <button class="icon-btn">🔍</button>
          <button class="icon-btn">⚙️</button>
        </div>
      </div>

      <div id="new-chat-btn">
        <span>➕</span>
        <span>New chat</span>
      </div>

      <div class="sidebar-menu-item">📁 Projects</div>
      <div class="sidebar-menu-item">📜 Codex</div>
      <div class="sidebar-menu-item">... More</div>

      <div id="recent-chats">
        <div class="recent-chat-title">Recents</div>
        <div class="recent-chat-item">Touch package installation error</div>
        <div class="recent-chat-item">Energy Flow Ecosystem Explanati...</div>
        <div class="recent-chat-item">Chatbot HTML Fix</div>
        <div class="recent-chat-item">Material Icons Issue</div>
        <div class="recent-chat-item">PyAudio Installation Error</div>
        <div class="recent-chat-item">Mobile Responsive CSS</div>
      </div>

      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar">MK</div>
          <div>
            <div>Manoj Kumar</div>
            <div style="font-size: 11px">Free</div>
          </div>
        </div>
        <button class="upgrade-btn">Upgrade</button>
      </div>
    </div>

    <div id="main-chat">
      <div id="chat-header">
        <button class="plus-btn"><span>✦</span> Get Plus</button>
        <button class="icon-btn" style="margin-left: 15px">👤</button>
      </div>

      <div id="chat-box">
        <div
          class="message bot"
          style="
            text-align: center;
            align-self: center;
            font-size: 28px;
            font-weight: 600;
            margin-top: auto;
            margin-bottom: 20px;
          "
        >
          Where should we begin?
        </div>
      </div>

      <div id="input-container">
        <button class="input-icon-btn">+</button>
        <input
          type="text"
          id="user-input"
          placeholder="Ask anything..."
          autocomplete="off"
        />
        <button class="input-icon-btn">🎤</button>
        <button class="input-icon-btn" onclick="sendMessage()">⬆️</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
